context:
  version: "0.10.1"

package:
  name: dra
  version: ${{ version }}

source:
  url: https://github.com/devmatteini/dra/archive/refs/tags/${{ version }}.tar.gz
  sha256: 81fc4e6bd174d238932a6415db7029a84acda5f4dc84a285ee0a10c6b3cb3580

build:
  number: 0
  script:
    env:
      CARGO_PROFILE_RELEASE_STRIP: symbols
      CARGO_PROFILE_RELEASE_LTO: fat
    content:
      - if: unix
        then:
          - cargo auditable install --locked --no-track --bins --root ${{ PREFIX }} --path .
        else:
          - cargo auditable install --locked --no-track --bins --root %LIBRARY_PREFIX% --path .
      - cargo-bundle-licenses --format yaml --output ./THIRDPARTY.yml
      - if: unix
        then:
          - mkdir -p $PREFIX/share/zsh/site-functions $PREFIX/share/bash-completion/completions $PREFIX/share/fish/vendor_completions.d
          - $PREFIX/bin/dra completion zsh > $PREFIX/share/zsh/site-functions/_dra
          - $PREFIX/bin/dra completion bash > $PREFIX/share/bash-completion/completions/dra
          - $PREFIX/bin/dra completion fish > $PREFIX/share/fish/vendor_completions.d/dra.fish
        else:
          - mkdir %LIBRARY_PREFIX%\share\powershell\completions
          - '%LIBRARY_PREFIX%\bin\dra.exe completion powershell > %LIBRARY_PREFIX%\share\powershell\completions\dra.ps1'

requirements:
  build:
    - ${{ stdlib('c') }}
    - ${{ compiler('c') }}
    - ${{ compiler('rust') }}
    - cargo-bundle-licenses
    - cargo-auditable

tests:
  - script:
      - dra --help
      - dra --version
  - package_contents:
      bin:
        - dra
      files:
        - if: unix
          then:
            - share/bash-completion/completions/dra
            - share/fish/vendor_completions.d/dra.fish
            - share/zsh/site-functions/_dra
        - if: win
          then:
            - Library/share/powershell/completions/dra.ps1
      strict: true

about:
  homepage: https://github.com/devmatteini/dra
  summary: A command line tool to download release assets from GitHub
  description: |
    dra helps you download release assets from GitHub more easily:
    no authentication needed for public repositories, built-in generation
    of patterns to select an asset to download, automatic selection based
    on your operating system and architecture, and support for downloading
    and installing assets in the most common formats.
  license: MIT
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  repository: https://github.com/devmatteini/dra

extra:
  recipe-maintainers:
    - salim-b
