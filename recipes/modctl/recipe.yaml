context:
  version: "0.1.2"
  git_commit: "06ac8b1"

package:
  name: modctl
  version: ${{ version }}

source:
  url: https://github.com/modelpack/modctl/archive/refs/tags/v${{ version }}.tar.gz
  sha256: b8f17e5c219cdffcb1cb4f2e7c7b3e9ebd2b597243146c9e992b5b259590fa34
  target_directory: src

build:
  number: 0
  script:
    - cd src
    - go-licenses save . --save_path ../library_licenses
    - if: unix
      then:
        - BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)
        - go build -v -o $PREFIX/bin/modctl -ldflags="-s -w -X github.com/modelpack/modctl/pkg/version.GitVersion=v${{ version }} -X github.com/modelpack/modctl/pkg/version.GitCommit=${{ git_commit }} -X github.com/modelpack/modctl/pkg/version.BuildTime=${BUILD_TIME}"
      else: go build -v -o %LIBRARY_BIN%\modctl.exe -ldflags="-s -X github.com/modelpack/modctl/pkg/version.GitVersion=v${{ version }} -X github.com/modelpack/modctl/pkg/version.GitCommit=${{ git_commit }}"
    - if: unix
      then:
        - mkdir -p $PREFIX/share/zsh/site-functions $PREFIX/share/bash-completion/completions $PREFIX/share/fish/vendor_completions.d
        - $PREFIX/bin/modctl completion zsh > $PREFIX/share/zsh/site-functions/_modctl
        - $PREFIX/bin/modctl completion bash > $PREFIX/share/bash-completion/completions/modctl
        - $PREFIX/bin/modctl completion fish > $PREFIX/share/fish/vendor_completions.d/modctl.fish

requirements:
  build:
    - ${{ compiler("go-nocgo") }}
    - go-licenses

tests:
  - script:
      - modctl --help
      - modctl version
  - package_contents:
      bin:
        - modctl
      files:
        - if: unix
          then:
            - share/bash-completion/completions/modctl
            - share/fish/vendor_completions.d/modctl.fish
            - share/zsh/site-functions/_modctl
      strict: true

about:
  homepage: https://github.com/modelpack/modctl
  summary: A CLI tool for managing OCI model artifacts bundled based on the ModelPack Specification
  description: |
    Modctl is a user-friendly CLI tool for managing OCI model artifacts, which are
    bundled based on the ModelPack Model Specification. It offers commands such as
    build, pull, push, and more, making it easy to interact with AI/ML model registries.
  license: Apache-2.0
  license_file:
    - src/LICENSE
    - library_licenses/
  repository: https://github.com/modelpack/modctl

extra:
  recipe-maintainers:
    - salim-b
