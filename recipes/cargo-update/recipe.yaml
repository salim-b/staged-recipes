context:
  version: "19.0.0"

package:
  name: cargo-update
  version: ${{ version }}

source:
  url: https://github.com/nabijaczleweli/cargo-update/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 1937584fc78fa340e63b0d8e5e26becbcda996fd2a97f7f75fc5fa3020689a3e

build:
  number: 0
  script:
    env:
      CARGO_PROFILE_RELEASE_STRIP: symbols
      CARGO_PROFILE_RELEASE_LTO: fat
    content:
      - if: unix
        then:
          - cargo auditable install --no-track --bins --root ${{ PREFIX }} --path .
        else:
          - cargo auditable install --no-track --bins --root %LIBRARY_PREFIX% --path .
      - cargo-bundle-licenses --format yaml --output ./THIRDPARTY.yml

requirements:
  build:
    - ${{ stdlib('c') }}
    - ${{ compiler('c') }}
    - ${{ compiler('rust') }}
    - cargo-bundle-licenses
    - cargo-auditable
  host:
    - openssl
    - libcurl
    - libssh2
    - libgit2
    - if: unix
      then: pkg-config

tests:
  - script:
      - cargo install-update --help
      - cargo help install-update
    requirements:
      run:
        - ${{ compiler('rust') }}
  - package_contents:
      bin:
        - cargo-install-update
        - cargo-install-update-config
      strict: true

about:
  homepage: https://github.com/nabijaczleweli/cargo-update
  summary: A cargo subcommand for checking and applying updates to installed executables
  description: |
    cargo-update provides the cargo install-update subcommand for cargo,
    allowing you to check for and apply updates to all installed cargo binaries.
  license: MIT
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  documentation: https://github.com/nabijaczleweli/cargo-update#readme
  repository: https://github.com/nabijaczleweli/cargo-update

extra:
  recipe-maintainers:
    - salim-b
