context:
  version: "1.1.3"

package:
  name: communique
  version: ${{ version }}

source:
  url: https://github.com/jdx/communique/archive/refs/tags/v${{ version }}.tar.gz
  sha256: b20d37ac4cccd470baa1ffa52fb21f7f3f324ccfcb091fbba6a0a801e366af27

build:
  number: 0
  script:
    env:
      CARGO_PROFILE_RELEASE_LTO: fat
      CARGO_PROFILE_RELEASE_STRIP: symbols
    content:
      - if: unix
        then:
          - cargo auditable install --path=. --root="$PREFIX" --no-track --locked --bins
      - if: win
        then:
          - cargo auditable install --path=. --root="%LIBRARY_PREFIX%" --no-track --locked --bins
      - cargo-bundle-licenses --format=yaml --output=./THIRDPARTY.yml

requirements:
  build:
    - ${{ stdlib('c') }}
    - ${{ compiler('c') }}
    - ${{ compiler('rust') }}
    - cargo-auditable
    - cargo-bundle-licenses

tests:
  - script:
      - communique --help
      - communique --version
  - package_contents:
      bin:
        - communique
      strict: true

about:
  summary: Editorialized release notes powered by AI
  description: |
    communique turns your git history, pull requests, and repository context into
    polished release notes. It can print notes locally, update CHANGELOG.md, or
    publish directly to a GitHub Release.
  license: MIT
  license_file:
    - THIRDPARTY.yml
  homepage: https://github.com/jdx/communique
  repository: https://github.com/jdx/communique

extra:
  recipe-maintainers:
    - salim-b
