context:
  version: "0.3.25"

package:
  name: phraze
  version: ${{ version }}

source:
  url: https://github.com/sts10/phraze/archive/refs/tags/v${{ version }}.tar.gz
  sha256: dd8697f531afcda654d610570f5d754ceb08f36e98f8dacb46963b511f218b49

build:
  number: 0
  script:
    env:
      CARGO_PROFILE_RELEASE_STRIP: symbols
      CARGO_PROFILE_RELEASE_LTO: fat
    content:
      - if: unix
        then:
          - cargo auditable install --locked --no-track --bins --root ${{ PREFIX }} --path .
        else:
          - cargo auditable install --locked --no-track --bins --root %LIBRARY_PREFIX% --path .
      - cargo-bundle-licenses --format yaml --output ./THIRDPARTY.yml
      - if: unix
        then:
          - mkdir -p $PREFIX/share/zsh/site-functions $PREFIX/share/bash-completion/completions $PREFIX/share/fish/vendor_completions.d
          - cp target/completions/_phraze $PREFIX/share/zsh/site-functions/_phraze
          - cp target/completions/phraze.bash $PREFIX/share/bash-completion/completions/phraze
          - cp target/completions/phraze.fish $PREFIX/share/fish/vendor_completions.d/phraze.fish

requirements:
  build:
    - ${{ stdlib('c') }}
    - ${{ compiler('c') }}
    - ${{ compiler('rust') }}
    - cargo-bundle-licenses
    - cargo-auditable

tests:
  - script:
      - phraze --help
      - phraze --version
  - package_contents:
      bin:
        - phraze
      files:
        - if: unix
          then:
            - share/bash-completion/completions/phraze
            - share/fish/vendor_completions.d/phraze.fish
            - share/zsh/site-functions/_phraze
      strict: true

about:
  homepage: https://github.com/sts10/phraze
  summary: Random passphrase generator
  description: |
    Phraze is a random passphrase generator that generates passphrases with
    user-configurable entropy, word counts, and built-in word lists. It is
    fast, supports a variety of separator options, and can include numbers,
    symbols, and capital letters.
  license: MPL-2.0
  license_file:
    - LICENSE.txt
    - THIRDPARTY.yml
  repository: https://github.com/sts10/phraze

extra:
  recipe-maintainers:
    - salim-b
