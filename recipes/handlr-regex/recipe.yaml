context:
  version: "0.13.0"

package:
  name: handlr-regex
  version: ${{ version }}

source:
  url: https://github.com/Anomalocaridid/handlr-regex/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 963126a7aa8277b7cc7886c518528473ce5117a5999c949b809e14beffdbad0d

build:
  number: 0
  skip:
    - win
    - osx
  script:
    env:
      CARGO_PROFILE_RELEASE_STRIP: symbols
      CARGO_PROFILE_RELEASE_LTO: fat
    content:
      - cargo auditable install --locked --no-track --bins --root ${{ PREFIX }} --path .
      - cargo-bundle-licenses --format yaml --output ./THIRDPARTY.yml
      - mkdir -p $PREFIX/share/zsh/site-functions $PREFIX/share/bash-completion/completions $PREFIX/share/fish/vendor_completions.d
      - COMPLETE=bash $PREFIX/bin/handlr > $PREFIX/share/bash-completion/completions/handlr
      - COMPLETE=fish $PREFIX/bin/handlr > $PREFIX/share/fish/vendor_completions.d/handlr.fish
      - COMPLETE=zsh $PREFIX/bin/handlr > $PREFIX/share/zsh/site-functions/_handlr

requirements:
  build:
    - ${{ stdlib('c') }}
    - ${{ compiler('c') }}
    - ${{ compiler('rust') }}
    - cargo-bundle-licenses
    - cargo-auditable

tests:
  - script:
      - handlr --help
      - handlr --version
  - package_contents:
      bin:
        - handlr
      files:
        - share/bash-completion/completions/handlr
        - share/fish/vendor_completions.d/handlr.fish
        - share/zsh/site-functions/_handlr
      strict: true

about:
  homepage: https://github.com/Anomalocaridid/handlr-regex
  summary: Manage your default applications with ease using handlr
  description: |
    Fork of handlr that lets you set default applications using regular
    expressions. Set default handlers by file extension or MIME type,
    intelligent MIME type detection, open multiple files at once, and more.
  license: MIT
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  repository: https://github.com/Anomalocaridid/handlr-regex

extra:
  recipe-maintainers:
    - salim-b
