context:
  version: "1.25.1"

package:
  name: aube
  version: ${{ version }}

source:
  url: https://github.com/jdx/aube/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 6efc7d07dbb58ce01a7f91117a76461c718b1248bc60ec87f5a37ecec7214cf2

build:
  number: 0
  script:
    env:
      CARGO_PROFILE_RELEASE_LTO: fat
      CARGO_PROFILE_RELEASE_STRIP: symbols
    content:
      # `aube completion <shell>` shells out to the separate `usage`
      # CLI (https://usage.jdx.dev) at runtime to render completions from
      # `aube.usage.kdl`; that tool isn't packaged on conda-forge (nor
      # anywhere else on the system at build or run time), so bash/fish/zsh
      # completions can't be generated here. aube also ships no man pages.
      - if: unix
        then:
          - cargo auditable install --path=crates/aube --root="$PREFIX" --no-track --locked --bins
      - if: win
        then:
          - cargo auditable install --path=crates/aube --root="%LIBRARY_PREFIX%" --no-track --locked --bins
      - cargo-bundle-licenses --format=yaml --output=./THIRDPARTY.yml

requirements:
  build:
    - ${{ stdlib('c') }}
    - ${{ compiler('c') }}
    - ${{ compiler('rust') }}
    - cargo-auditable
    - cargo-bundle-licenses
    - clang
    - cmake
    - libclang
    - make
    - ninja
    - pkg-config

tests:
  - script:
      - aube --help
      - aube --version
      - aubr --help
      - aubr --version
      - aubx --help
      - aubx --version
  - package_contents:
      bin:
        - aube
        - aubr
        - aubx
      strict: true

about:
  summary: Aube — a fast Node.js package manager
  description: |
    Aube installs automatically when you run a script. It has the tightest
    security defaults of any Node.js package manager and is the only one
    with a lifecycle-script jail. Aube drops into existing projects using
    their existing lockfiles (pnpm-lock.yaml, package-lock.json,
    npm-shrinkwrap.json, yarn.lock and bun.lock).
  license: MIT
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  homepage: https://aube.jdx.dev
  repository: https://github.com/jdx/aube

extra:
  recipe-maintainers:
    - salim-b
